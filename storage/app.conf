limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;
server {
    listen 443 ssl;
    server_name yoyoycell.my.id;

    ssl_certificate /etc/letsencrypt/live/yoyoycell.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoyoycell.my.id/privkey.pem;

    root /www/wwwroot/rbm/public;
    index index.php index.html;

    location / {
        limit_req zone=api_limit burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass apprbmdocker:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
    }
}

server {
    listen 80;
    server_name yoyoycell.my.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name n8n.yoyoycell.my.id;

    ssl_certificate /etc/letsencrypt/live/yoyoycell.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoyoycell.my.id/privkey.pem;

    location / {
        proxy_pass http://n8n_rbm:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}

server {
    listen 80;
    server_name n8n.yoyoycell.my.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------- REVERSE PROXY UNTUK POISY ---------
server {
    listen 80;
    server_name poisy.id www.poisy.id;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name poisy.id www.poisy.id;

    # --------- PENTING SSL ---------
    # UNCOMMENT 2 baris di bawah ini setelah ssl certificate poisy.id dibuat
    # dengan perintah certbot di dalam container rbm Nginx, misalnya:
    # docker exec -it web_server_rbm certbot certonly --webroot -w /www/wwwroot/rbm/public -d poisy.id -d www.poisy.id
    # Atau metode yang biasanya Anda gunakan
    # -------------------------------
    ssl_certificate /etc/letsencrypt/live/poisy.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poisy.id/privkey.pem;

    location / {
        proxy_pass http://web_server_poisy:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
